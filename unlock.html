<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#19233A" />
  <title>Hidden Worlds — Your Reward</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #19233A;
      color: #F0EDE6;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Progress dots ── */
    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      padding: 1.5rem 0 0;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2E3D5A;
      transition: background 0.35s, transform 0.35s;
    }
    .dot.active {
      background: #C8961E;
      transform: scale(1.3);
    }

    /* ── Error ── */
    .error-wrap {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .error-msg {
      font-size: 1rem;
      color: #6A7A99;
      max-width: 260px;
      line-height: 1.65;
      text-align: center;
    }

    /* ── Screen base ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 5rem 1.5rem 3.5rem;
      text-align: center;
    }
    .screen.active {
      display: flex;
      animation: screenIn 0.4s ease both;
    }
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Logo ── */
    .logo {
      width: 90px;
      opacity: 0.88;
      margin-bottom: 2rem;
      flex-shrink: 0;
    }

    /* ── Primary button ── */
    .primary-btn {
      width: 100%;
      max-width: 320px;
      background: #C8961E;
      color: #0D1525;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      padding: 1rem 2rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .primary-btn:active { opacity: 0.8; transform: scale(0.97); }

    /* ──────────────────────────────────────────────
       SCREEN 1 — The promise kept
    ────────────────────────────────────────────── */
    .s1-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding-bottom: 2rem;
    }
    .s1-heading {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #C8B97A;
    }
    .s1-sub {
      font-style: italic;
      font-size: 1.05rem;
      color: #6A7A99;
      margin-bottom: 2.5rem;
    }

    /* ──────────────────────────────────────────────
       SCREEN 2 — Card reveal
    ────────────────────────────────────────────── */
    .card-scene {
      width: min(62vw, 200px);
      margin: 0 auto 0;
      flex-shrink: 0;
      perspective: 900px;
    }
    .card-flipper {
      width: 100%;
      aspect-ratio: 2 / 3;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(.4,0,.2,1);
    }
    .card-flipper.flipped {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 10px;
      overflow: hidden;
    }
    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-face.cf-back {
      transform: rotateY(0deg);
      box-shadow: 0 10px 36px rgba(0,0,0,0.55);
    }
    .card-face.cf-front {
      transform: rotateY(180deg);
      box-shadow:
        0 10px 36px rgba(0,0,0,0.55),
        0 0 48px 10px rgba(200, 150, 30, 0.35);
    }
    .reveal-text {
      opacity: 0;
      transition: opacity 0.5s ease;
      margin-top: 1.5rem;
      width: 100%;
      max-width: 320px;
    }
    .reveal-text.visible { opacity: 1; }
    .reveal-city {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #6A7A99;
      margin-bottom: 0.3rem;
    }
    .reveal-subject {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #F0EDE6;
      margin-bottom: 0.7rem;
    }
    .reveal-connection {
      font-style: italic;
      font-size: 1.05rem;
      color: #C8B97A;
      line-height: 1.55;
      margin-bottom: 1.75rem;
    }

    /* ──────────────────────────────────────────────
       SCREEN 3 — Passport
    ────────────────────────────────────────────── */
    .passport-header {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #C8B97A;
      margin-bottom: 0.25rem;
    }
    .passport-season {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4A5A78;
      margin-bottom: 1.25rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      margin: 0 auto 1.25rem;
    }
    .grid-card {
      position: relative;
      border-radius: 8px;
      overflow: visible;
    }
    .grid-card-img-wrap {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }
    .grid-card img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      display: block;
    }
    .grid-card.locked img {
      filter: grayscale(75%) brightness(0.55);
    }
    .lock-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lock-icon {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.25);
    }
    .grid-card-label {
      padding: 0.4rem 0 0.1rem;
      text-align: center;
    }
    .grid-city-label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.52rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #4A5A78;
    }
    .grid-card.unlocked .grid-city-label { color: #6A7A99; }
    .grid-subject-label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      font-weight: 600;
      color: #3A4A62;
      margin-top: 1px;
      line-height: 1.3;
    }
    .grid-card.unlocked .grid-subject-label { color: #C8C0B0; }

    .count-chip {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6A7A99;
      border: 1px solid #2E3D5A;
      border-radius: 50px;
      padding: 0.35rem 1.1rem;
      margin-bottom: 0.5rem;
    }
    .digital-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #3A4A62;
      margin-bottom: 1.5rem;
    }

    /* ──────────────────────────────────────────────
       SCREEN 4 — Physical voucher
    ────────────────────────────────────────────── */
    .voucher-headline {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #C8B97A;
      margin-bottom: 0.6rem;
    }
    .voucher-sub {
      font-style: italic;
      font-size: 1rem;
      color: #8899B8;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 1.75rem;
    }
    .voucher-card-wrap {
      width: min(50vw, 160px);
      margin: 0 auto 0.75rem;
      flex-shrink: 0;
    }
    .voucher-card-wrap img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 9px;
      display: block;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.5),
        0 0 36px 6px rgba(200, 150, 30, 0.3);
    }
    .voucher-card-id {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: #6A7A99;
      margin-bottom: 1.75rem;
    }
    #qr-canvas {
      border-radius: 10px;
      display: block;
      margin: 0 auto 0.6rem;
    }
    .qr-hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4A5A78;
    }
  </style>
</head>
<body>

  <!-- Progress dots — always visible -->
  <div class="progress-dots" id="dots">
    <div class="dot" data-s="1"></div>
    <div class="dot" data-s="2"></div>
    <div class="dot" data-s="3"></div>
    <div class="dot" data-s="4"></div>
  </div>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    // ── Card data ──────────────────────────────────────────────────────────────
    const CARDS = {
      'LDN-2601': {
        city: 'LONDON', subject: 'THE SEVEN NOSES', folder: 'seven-noses',
        quote: 'Thirty-five noses.\nFourteen years of silence.',
        blurb: 'In 1997, an unknown artist secretly fixed 35 plaster noses across Soho — a silent protest against surveillance cameras. He stayed hidden for 14 years; legend promises fortune to anyone who finds all seven.',
        connection: 'The noses most visitors walk past without knowing. You know.',
      },
      'LDN-2602': {
        city: 'LONDON', subject: 'NOTTING HILL CARNIVAL', folder: 'notting-hill-carnival',
        quote: 'They answered with music.',
        blurb: 'In 1958, racist mobs attacked Caribbean families across Notting Hill. The community\'s answer was not retreat — steel bands marched the same streets, turning grief into Europe\'s loudest celebration.',
        connection: 'The carnival that turned grief into music. You know why.',
      },
      'LDN-2603': {
        city: 'LONDON', subject: 'UNDERGROUND REPUBLIC', folder: 'underground-republics',
        quote: 'When the city went dark,\nthey built one below.',
        blurb: 'When the government banned Underground sheltering during the Blitz, Londoners broke in and built a city inside — bunks, a theatre, a library, elected committees. When authority abandoned them, they governed themselves.',
        connection: 'The republic built underground. You know what they made.',
      },
      'MLT-2601': {
        city: 'PAOLA', subject: 'ORACLE CHAMBER', folder: 'malta-oracle-chamber',
        quote: 'Architecture amplifies authority.',
        blurb: 'Built 5,000 years ago, the Oracle Chamber was carved to amplify the human voice into something divine. Whoever spoke here didn\'t need an army — the stone obeyed.',
        connection: 'The chamber that turned voices into something divine. You know how.',
      },
      'FRA-2601': {
        city: 'FRANKFURT', subject: 'WAHLKAPELLE', folder: 'frankfurt-wahlkapelle',
        quote: 'Seven electors. One crown.\nBread and water.',
        blurb: 'Hidden inside Frankfurt Cathedral, seven men were locked in the Election Chapel and fed only bread and water until they agreed on the next Holy Roman Emperor. Europe\'s most powerful throne was decided by starvation.',
        connection: 'The room where empires were decided by hunger. You know the secret.',
      },
      'DBV-2601': {
        city: 'DUBROVNIK', subject: 'RUĐER BOŠKOVIĆ', folder: 'dubrovnik-rudjer-boskovic',
        quote: 'A republic sends its sharpest mind,\nnot its loudest voice.',
        blurb: 'The Republic of Ragusa didn\'t build the largest army — it sent Ruđer Bošković, a polymath who protected Dubrovnik\'s independence through intellect alone. For a small republic surrounded by empires, brains were the deadliest weapon.',
        connection: 'The diplomat Aldric had you find. Now you hold his story.',
      },
    };

    const TOKENS = {
      'LDN-2601': 'A9YNNGQV', 'LDN-2602': 'X3MG60MJ', 'LDN-2603': 'D5ALR7ID',
      'MLT-2601': 'UQXTC568', 'FRA-2601': 'MS5WWKJJ', 'DBV-2601': 'QD1RQGWT',
    };

    const CARD_ORDER = ['LDN-2601','LDN-2602','LDN-2603','MLT-2601','FRA-2601','DBV-2601'];
    const STORAGE_KEY = 'hw_digital_claims';

    function getClaimed() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function markClaimed(id) {
      const list = getClaimed();
      if (!list.includes(id)) { list.push(id); localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
    }

    // ── Parse URL ──────────────────────────────────────────────────────────────
    const params     = new URLSearchParams(location.search);
    const rawId      = (params.get('unlock') || '').trim().toUpperCase();
    const token      = (params.get('token')  || '').trim().toUpperCase();
    const archiveId  = rawId.replace(/-R\d+$/i, '');
    const card       = CARDS[archiveId];
    const validToken = TOKENS[archiveId];

    const root = document.getElementById('root');

    // ── Invalid link ───────────────────────────────────────────────────────────
    if (!card || !validToken || token !== validToken) {
      document.getElementById('dots').style.display = 'none';
      root.innerHTML = `<div class="error-wrap"><p class="error-msg">This link has expired.</p></div>`;
    } else {

      // ── Render all screens ─────────────────────────────────────────────────
      root.innerHTML = `
        <!-- Screen 1 -->
        <div class="screen" id="screen-1">
          <img class="logo" src="assets/logo.png" alt="Hidden Worlds" />
          <div class="s1-body">
            <div class="s1-heading">You passed.</div>
            <p class="s1-sub">Aldric doesn't say that often.</p>
            <button class="primary-btn" id="s1-btn">See your reward</button>
          </div>
        </div>

        <!-- Screen 2 -->
        <div class="screen" id="screen-2">
          <img class="logo" src="assets/logo.png" alt="Hidden Worlds" />
          <div class="card-scene">
            <div class="card-flipper" id="card-flipper">
              <div class="card-face cf-back">
                <img src="cards/${card.folder}/back.png" alt="card back" />
              </div>
              <div class="card-face cf-front">
                <img src="cards/${card.folder}/front.png" alt="${card.subject}" />
              </div>
            </div>
          </div>
          <div class="reveal-text" id="reveal-text">
            <div class="reveal-city">${card.city}</div>
            <div class="reveal-subject">${card.subject}</div>
            <p class="reveal-connection">${card.connection}</p>
            <button class="primary-btn" id="s2-btn">Add to your passport</button>
          </div>
        </div>

        <!-- Screen 3 -->
        <div class="screen" id="screen-3">
          <img class="logo" src="assets/logo.png" alt="Hidden Worlds" />
          <div class="passport-header">Storyhunter Passport</div>
          <div class="passport-season">Season I · 2026</div>
          <div class="card-grid" id="card-grid"></div>
          <span class="count-chip" id="count-chip"></span>
          <div class="digital-label">Digital Edition</div>
          <button class="primary-btn" id="s3-btn">Claim the physical card</button>
        </div>

        <!-- Screen 4 -->
        <div class="screen" id="screen-4">
          <img class="logo" src="assets/logo.png" alt="Hidden Worlds" />
          <div class="voucher-headline">You've earned the real one.</div>
          <p class="voucher-sub">Show this screen at the duty free to collect your physical card.</p>
          <div class="voucher-card-wrap">
            <img src="cards/${card.folder}/front.png" alt="${card.subject}" />
          </div>
          <div class="voucher-card-id">${archiveId} · ${card.subject}</div>
          <canvas id="qr-canvas"></canvas>
          <div class="qr-hint">Scan to verify</div>
        </div>
      `;

      // ── Screen navigation ──────────────────────────────────────────────────
      function goTo(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${n}`).classList.add('active');
        document.querySelectorAll('.dot').forEach((d, i) => {
          d.classList.toggle('active', i + 1 === n);
        });
        window.scrollTo(0, 0);
      }

      // Screen 2 — card flip + reveal text
      function initScreen2() {
        setTimeout(() => {
          document.getElementById('card-flipper').classList.add('flipped');
          setTimeout(() => {
            document.getElementById('reveal-text').classList.add('visible');
          }, 780);
        }, 1100);
      }

      // Screen 3 — render passport grid
      function initScreen3() {
        const claimed = getClaimed();
        const count = claimed.length;
        document.getElementById('count-chip').textContent = `${count} of ${Object.keys(CARDS).length} cards`;

        const grid = document.getElementById('card-grid');
        grid.innerHTML = CARD_ORDER.map(id => {
          const c = CARDS[id];
          const isUnlocked = claimed.includes(id);
          return `
            <div class="grid-card ${isUnlocked ? 'unlocked' : 'locked'}">
              <div class="grid-card-img-wrap">
                <img src="cards/${c.folder}/front.png" alt="${c.subject}" />
                ${!isUnlocked ? `<div class="lock-overlay"><span class="lock-icon">◼</span></div>` : ''}
              </div>
              <div class="grid-card-label">
                <span class="grid-city-label">${c.city}</span>
                <span class="grid-subject-label">${c.subject}</span>
              </div>
            </div>`;
        }).join('');
      }

      // Screen 4 — generate QR
      function initScreen4() {
        const qrUrl = `https://maxpax1.github.io/hidden-worlds-passport/unlock.html?unlock=${archiveId}&token=${token}`;
        QRCode.toCanvas(document.getElementById('qr-canvas'), qrUrl, {
          width: 176,
          margin: 1,
          color: { dark: '#F0EDE6', light: '#19233A' },
        });
      }

      // ── Button wiring ──────────────────────────────────────────────────────
      document.getElementById('s1-btn').addEventListener('click', () => {
        markClaimed(archiveId);
        goTo(2);
        initScreen2();
      });

      document.addEventListener('click', e => {
        if (e.target.id === 's2-btn') { goTo(3); initScreen3(); }
        if (e.target.id === 's3-btn') { goTo(4); initScreen4(); }
      });

      // ── Entry point ────────────────────────────────────────────────────────
      goTo(1);
    }
  </script>
</body>
</html>
