<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#19233A" />
  <title>Hidden Worlds — Your Reward</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #19233A;
      color: #F0EDE6;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Progress dots ── */
    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      padding: 1.5rem 0 0;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2E3D5A;
      transition: background 0.35s, transform 0.35s;
    }
    .dot.active {
      background: #C8961E;
      transform: scale(1.3);
    }

    /* ── Error ── */
    .error-wrap {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .error-msg {
      font-size: 1rem;
      color: #6A7A99;
      max-width: 260px;
      line-height: 1.65;
      text-align: center;
    }

    /* ── Screen base ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 5rem 1.5rem 3.5rem;
      text-align: center;
    }
    .screen.active {
      display: flex;
      animation: screenIn 0.4s ease both;
    }
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Logo ── */
    .logo {
      width: 90px;
      opacity: 0.88;
      margin-bottom: 2rem;
      flex-shrink: 0;
    }

    /* ── Primary button ── */
    .primary-btn {
      width: 100%;
      max-width: 320px;
      background: #C8961E;
      color: #0D1525;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      padding: 1rem 2rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .primary-btn:active { opacity: 0.8; transform: scale(0.97); }

    /* ──────────────────────────────────────────────
       SCREEN 1 — The promise kept
    ────────────────────────────────────────────── */
    .s1-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding-bottom: 2rem;
    }
    .s1-heading {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #C8B97A;
    }
    .s1-sub {
      font-style: italic;
      font-size: 1.05rem;
      color: #6A7A99;
      margin-bottom: 2.5rem;
    }

    /* ──────────────────────────────────────────────
       SCREEN 2 — Card reveal
    ────────────────────────────────────────────── */
    .card-scene {
      width: min(62vw, 200px);
      margin: 0 auto 0;
      flex-shrink: 0;
      perspective: 900px;
    }
    .card-flipper {
      width: 100%;
      aspect-ratio: 2 / 3;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(.4,0,.2,1);
    }
    .card-flipper.flipped {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 10px;
      overflow: hidden;
    }
    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-face.cf-back {
      transform: rotateY(0deg);
      box-shadow: 0 10px 36px rgba(0,0,0,0.55);
    }
    .card-face.cf-front {
      transform: rotateY(180deg);
      box-shadow:
        0 10px 36px rgba(0,0,0,0.55),
        0 0 48px 10px rgba(200, 150, 30, 0.35);
    }
    .reveal-text {
      opacity: 0;
      transition: opacity 0.5s ease;
      margin-top: 1.5rem;
      width: 100%;
      max-width: 320px;
    }
    .reveal-text.visible { opacity: 1; }
    .reveal-city {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #6A7A99;
      margin-bottom: 0.3rem;
    }
    .reveal-subject {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #F0EDE6;
      margin-bottom: 0.7rem;
    }
    .reveal-connection {
      font-style: italic;
      font-size: 1.05rem;
      color: #C8B97A;
      line-height: 1.55;
      margin-bottom: 1.75rem;
    }

    /* ──────────────────────────────────────────────
       SCREEN 3 — Passport
    ────────────────────────────────────────────── */
    .passport-header {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #C8B97A;
      margin-bottom: 0.25rem;
    }
    .passport-season {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4A5A78;
      margin-bottom: 1.25rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      margin: 0 auto 1.25rem;
    }
    .grid-card {
      position: relative;
      border-radius: 8px;
      overflow: visible;
    }
    .grid-card-img-wrap {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }
    .grid-card img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      display: block;
    }
    .grid-card.locked img {
      filter: grayscale(75%) brightness(0.55);
    }
    .lock-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lock-icon {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.25);
    }
    .grid-card-label {
      padding: 0.4rem 0 0.1rem;
      text-align: center;
    }
    .grid-city-label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.52rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #4A5A78;
    }
    .grid-card.unlocked .grid-city-label { color: #6A7A99; }
    .grid-subject-label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      font-weight: 600;
      color: #3A4A62;
      margin-top: 1px;
      line-height: 1.3;
    }
    .grid-card.unlocked .grid-subject-label { color: #C8C0B0; }

    .count-chip {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6A7A99;
      border: 1px solid #2E3D5A;
      border-radius: 50px;
      padding: 0.35rem 1.1rem;
      margin-bottom: 0.5rem;
    }
    .digital-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #3A4A62;
      margin-bottom: 1.5rem;
    }

    /* ──────────────────────────────────────────────
       SCREEN 3 — World map
    ────────────────────────────────────────────── */
    .world-map-wrap {
      width: 100%;
      max-width: 340px;
      margin: 0 auto 0.75rem;
      flex-shrink: 0;
      border-radius: 10px;
      overflow: hidden;
    }
    .world-map {
      width: 100%;
      height: auto;
      display: block;
    }
    .continent {
      fill: #2A3A56;
      stroke: #3A4D6A;
      stroke-width: 0.3;
      stroke-linejoin: round;
    }
    .passport-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #4A5A78;
      margin-bottom: 1.5rem;
    }

    /* ──────────────────────────────────────────────
       SCREEN 4 — Physical voucher
    ────────────────────────────────────────────── */
    .voucher-headline {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #C8B97A;
      margin-bottom: 0.6rem;
    }
    .voucher-sub {
      font-style: italic;
      font-size: 1rem;
      color: #8899B8;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 1.25rem;
    }
    .voucher-why {
      background: rgba(200,150,30,0.07);
      border: 1px solid rgba(200,150,30,0.2);
      border-radius: 10px;
      padding: 14px 18px;
      max-width: 300px;
      margin: 0 auto 1.75rem;
      text-align: center;
    }
    .voucher-why-title {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #C8B97A;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .voucher-why-body {
      font-size: 0.88rem;
      color: #8899B8;
      line-height: 1.55;
      font-style: italic;
    }
    .voucher-card-wrap {
      width: min(50vw, 160px);
      margin: 0 auto 0.75rem;
      flex-shrink: 0;
    }
    .voucher-card-wrap img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 9px;
      display: block;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.5),
        0 0 36px 6px rgba(200, 150, 30, 0.3);
    }
    .voucher-card-id {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: #6A7A99;
      margin-bottom: 1.75rem;
    }
    #qr-canvas {
      border-radius: 10px;
      display: block;
      margin: 0 auto 0.6rem;
    }
    .qr-hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4A5A78;
    }
  </style>
</head>
<body>

  <!-- Progress dots — always visible -->
  <div class="progress-dots" id="dots">
    <div class="dot" data-s="1"></div>
    <div class="dot" data-s="2"></div>
    <div class="dot" data-s="3"></div>
    <div class="dot" data-s="4"></div>
  </div>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    // ── Card data ──────────────────────────────────────────────────────────────
    const CARDS = {
      'LDN-2601': {
        city: 'LONDON', subject: 'THE SEVEN NOSES', folder: 'seven-noses',
        quote: 'Thirty-five noses.\nFourteen years of silence.',
        blurb: 'In 1997, an unknown artist secretly fixed 35 plaster noses across Soho — a silent protest against surveillance cameras. He stayed hidden for 14 years; legend promises fortune to anyone who finds all seven.',
        connection: 'The noses most visitors walk past without knowing. You know.',
      },
      'LDN-2602': {
        city: 'LONDON', subject: 'NOTTING HILL CARNIVAL', folder: 'notting-hill-carnival',
        quote: 'They answered with music.',
        blurb: 'In 1958, racist mobs attacked Caribbean families across Notting Hill. The community\'s answer was not retreat — steel bands marched the same streets, turning grief into Europe\'s loudest celebration.',
        connection: 'The carnival that turned grief into music. You know why.',
      },
      'LDN-2603': {
        city: 'LONDON', subject: 'UNDERGROUND REPUBLIC', folder: 'underground-republics',
        quote: 'When the city went dark,\nthey built one below.',
        blurb: 'When the government banned Underground sheltering during the Blitz, Londoners broke in and built a city inside — bunks, a theatre, a library, elected committees. When authority abandoned them, they governed themselves.',
        connection: 'The republic built underground. You know what they made.',
      },
      'MLT-2601': {
        city: 'PAOLA', subject: 'ORACLE CHAMBER', folder: 'malta-oracle-chamber',
        quote: 'Architecture amplifies authority.',
        blurb: 'Built 5,000 years ago, the Oracle Chamber was carved to amplify the human voice into something divine. Whoever spoke here didn\'t need an army — the stone obeyed.',
        connection: 'The chamber that turned voices into something divine. You know how.',
      },
      'FRA-2601': {
        city: 'FRANKFURT', subject: 'WAHLKAPELLE', folder: 'frankfurt-wahlkapelle',
        quote: 'Seven electors. One crown.\nBread and water.',
        blurb: 'Hidden inside Frankfurt Cathedral, seven men were locked in the Election Chapel and fed only bread and water until they agreed on the next Holy Roman Emperor. Europe\'s most powerful throne was decided by starvation.',
        connection: 'The room where empires were decided by hunger. You know the secret.',
      },
      'DBV-2601': {
        city: 'DUBROVNIK', subject: 'RUĐER BOŠKOVIĆ', folder: 'dubrovnik-rudjer-boskovic',
        quote: 'A republic sends its sharpest mind,\nnot its loudest voice.',
        blurb: 'The Republic of Ragusa didn\'t build the largest army — it sent Ruđer Bošković, a polymath who protected Dubrovnik\'s independence through intellect alone. For a small republic surrounded by empires, brains were the deadliest weapon.',
        connection: 'Born inside these walls. The Republic\'s sharpest mind. Now yours.',
      },
    };

    const TOKENS = {
      'LDN-2601': 'A9YNNGQV', 'LDN-2602': 'X3MG60MJ', 'LDN-2603': 'D5ALR7ID',
      'MLT-2601': 'UQXTC568', 'FRA-2601': 'MS5WWKJJ', 'DBV-2601': 'QD1RQGWT',
    };

    const CARD_ORDER = ['LDN-2601','LDN-2602','LDN-2603','MLT-2601','FRA-2601','DBV-2601'];
    const STORAGE_KEY = 'hw_digital_claims';

    function getClaimed() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function markClaimed(id) {
      const list = getClaimed();
      if (!list.includes(id)) { list.push(id); localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
    }

    // ── Parse URL ──────────────────────────────────────────────────────────────
    const params     = new URLSearchParams(location.search);
    const rawId      = (params.get('unlock') || '').trim().toUpperCase();
    const token      = (params.get('token')  || '').trim().toUpperCase();
    const archiveId  = rawId.replace(/-R\d+$/i, '');
    const card       = CARDS[archiveId];
    const validToken = TOKENS[archiveId];

    const root = document.getElementById('root');

    // ── Invalid link ───────────────────────────────────────────────────────────
    if (!card || !validToken || token !== validToken) {
      document.getElementById('dots').style.display = 'none';
      root.innerHTML = `<div class="error-wrap"><p class="error-msg">This link has expired.</p></div>`;
    } else {

      // ── Render all screens ─────────────────────────────────────────────────
      root.innerHTML = `
        <!-- Screen 1 -->
        <div class="screen" id="screen-1">
          <img class="logo" src="assets/logo.png" alt="Hidden Worlds" />
          <div class="s1-body">
            <div class="s1-heading">You read carefully.</div>
            <p class="s1-sub">Few people who walk through that city could say the same.</p>
            <button class="primary-btn" id="s1-btn">See what you've earned</button>
          </div>
        </div>

        <!-- Screen 2 -->
        <div class="screen" id="screen-2">
          <img class="logo" src="assets/logo.png" alt="Hidden Worlds" />
          <div class="card-scene">
            <div class="card-flipper" id="card-flipper">
              <div class="card-face cf-back">
                <img src="cards/${card.folder}/back.png" alt="card back" />
              </div>
              <div class="card-face cf-front">
                <img src="cards/${card.folder}/front.png" alt="${card.subject}" />
              </div>
            </div>
          </div>
          <div class="reveal-text" id="reveal-text">
            <div class="reveal-city">${card.city}</div>
            <div class="reveal-subject">${card.subject}</div>
            <p class="reveal-connection">${card.connection}</p>
            <button class="primary-btn" id="s2-btn">Add to your passport</button>
          </div>
        </div>

        <!-- Screen 3 -->
        <div class="screen" id="screen-3">
          <img class="logo" src="assets/logo.png" alt="Hidden Worlds" />
          <div class="passport-header">Storyhunter Passport</div>
          <div class="passport-season">Season I · 2026</div>
          <div class="world-map-wrap">
            <svg id="passport-map" class="world-map" viewBox="150 20 80 65" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
          <span class="count-chip" id="count-chip"></span>
          <div class="passport-sub">Tap a pin to explore.</div>
          <button class="primary-btn" id="s3-btn">Claim the physical card</button>
        </div>

        <!-- Screen 4 -->
        <div class="screen" id="screen-4">
          <img class="logo" src="assets/logo.png" alt="Hidden Worlds" />
          <div class="voucher-headline">Your card is waiting.</div>
          <p class="voucher-sub">Show this at the duty free. It tells them you earned it.</p>
          <div class="voucher-card-wrap">
            <img src="cards/${card.folder}/front.png" alt="${card.subject}" />
          </div>
          <div class="voucher-card-id">${archiveId} · ${card.subject}</div>
          <canvas id="qr-canvas"></canvas>
          <div class="qr-hint">Scan to verify</div>
        </div>
      `;

      // ── Screen navigation ──────────────────────────────────────────────────
      function goTo(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${n}`).classList.add('active');
        document.querySelectorAll('.dot').forEach((d, i) => {
          d.classList.toggle('active', i + 1 === n);
        });
        window.scrollTo(0, 0);
      }

      // Screen 2 — card flip + reveal text
      function initScreen2() {
        setTimeout(() => {
          document.getElementById('card-flipper').classList.add('flipped');
          setTimeout(() => {
            document.getElementById('reveal-text').classList.add('visible');
          }, 780);
        }, 1100);
      }

      // Screen 3 — render world map with city pins
      function initScreen3() {
        const claimed = getClaimed();
        const count = claimed.length;
        document.getElementById('count-chip').textContent = `${count} of ${Object.keys(CARDS).length} cards`;

        // City pins: equirectangular coords (cx = lon+180, cy = 90-lat)
        const CITY_PINS = [
          { id: 'LDN-2601', label: 'LONDON',    cx: 180.0, cy: 38.5, anchor: 'middle', lx:  0,  ly: -4.5 },
          { id: 'FRA-2601', label: 'FRANKFURT', cx: 188.7, cy: 39.9, anchor: 'start',  lx:  3,  ly: -3   },
          { id: 'DBV-2601', label: 'DUBROVNIK', cx: 197.5, cy: 47.0, anchor: 'middle', lx:  0,  ly: -5   },
          { id: 'MLT-2601', label: 'PAOLA',     cx: 194.5, cy: 54.1, anchor: 'middle', lx:  0,  ly:  6   },
        ];

        const continents = `
          <defs>
            <filter id="pin-glow" x="-200%" y="-200%" width="500%" height="500%">
              <feGaussianBlur stdDeviation="1.8" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect x="150" y="20" width="80" height="65" fill="#141E33"/>
          <!-- British Isles -->
          <path class="continent" d="M 174,39 L 181,36 L 182,40 L 179,44 L 174,43 Z"/>
          <path class="continent" d="M 171,39 L 175,38 L 174,43 L 170,42 Z"/>
          <!-- Iberian Peninsula -->
          <path class="continent" d="M 171,46 L 179,46 L 183,48 L 180,53 L 174,53 Z"/>
          <!-- France + Benelux -->
          <path class="continent" d="M 175,42 L 183,39 L 188,37 L 190,34 L 188,42 L 186,46 L 182,47 L 177,47 Z"/>
          <!-- Scandinavia -->
          <path class="continent" d="M 186,35 L 196,29 L 205,24 L 210,20 L 210,30 L 205,32 L 200,35 L 191,36 Z"/>
          <!-- Germany + Central Europe -->
          <path class="continent" d="M 187,41 L 195,36 L 205,37 L 206,43 L 200,44 L 193,44 L 188,43 Z"/>
          <!-- Poland + Baltic -->
          <path class="continent" d="M 195,35 L 210,33 L 212,38 L 205,38 L 196,36 Z"/>
          <!-- Italy -->
          <path class="continent" d="M 186,45 L 194,44 L 197,50 L 193,55 L 189,53 Z"/>
          <!-- Balkans -->
          <path class="continent" d="M 193,43 L 210,43 L 211,50 L 204,53 L 197,51 L 193,48 Z"/>
          <!-- Greece -->
          <path class="continent" d="M 200,52 L 209,50 L 211,56 L 204,59 L 199,56 Z"/>
          <!-- Turkey (W) -->
          <path class="continent" d="M 208,43 L 226,43 L 228,51 L 211,56 L 208,50 Z"/>
          <!-- North Africa -->
          <path class="continent" d="M 155,57 L 230,57 L 230,85 L 155,85 Z"/>
        `;

        const pins = CITY_PINS.map(p => {
          const isUnlocked = claimed.includes(p.id);
          const r = isUnlocked ? 2.8 : 1.6;
          const dotFill = isUnlocked ? '#C8961E' : '#3A4A62';
          const labelFill = isUnlocked ? '#C8B97A' : '#2E3D5A';
          const labelSize = isUnlocked ? 3.2 : 2.4;
          const glowFilter = isUnlocked ? 'filter="url(#pin-glow)"' : '';
          const countLine = isUnlocked
            ? `<text x="${p.cx + p.lx}" y="${p.cy + p.ly + 4.5}" text-anchor="${p.anchor}" fill="#C8961E" font-size="2.4" font-family="Montserrat,sans-serif" font-weight="600">1/1</text>`
            : '';
          return `
            <g>
              <circle cx="${p.cx}" cy="${p.cy}" r="${r}" fill="${dotFill}" ${glowFilter}/>
              <text x="${p.cx + p.lx}" y="${p.cy + p.ly}" text-anchor="${p.anchor}" fill="${labelFill}" font-size="${labelSize}" font-family="Montserrat,sans-serif" font-weight="600" letter-spacing="0.04">${p.label}</text>
              ${countLine}
            </g>`;
        }).join('');

        document.getElementById('passport-map').innerHTML = continents + pins;
      }

      // Screen 4 — generate QR
      function initScreen4() {
        const qrUrl = `https://maxpax1.github.io/hidden-worlds-passport/unlock.html?unlock=${archiveId}&token=${token}`;
        QRCode.toCanvas(document.getElementById('qr-canvas'), qrUrl, {
          width: 176,
          margin: 1,
          color: { dark: '#F0EDE6', light: '#19233A' },
        });
      }

      // ── Button wiring ──────────────────────────────────────────────────────
      document.getElementById('s1-btn').addEventListener('click', () => {
        markClaimed(archiveId);
        goTo(2);
        initScreen2();
      });

      document.addEventListener('click', e => {
        if (e.target.id === 's2-btn') { goTo(3); initScreen3(); }
        if (e.target.id === 's3-btn') { goTo(4); initScreen4(); }
      });

      // ── Entry point ────────────────────────────────────────────────────────
      goTo(1);
    }
  </script>
</body>
</html>
