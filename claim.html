<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#19233A" />
  <title>Hidden Worlds — Card Claim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #19233A;
      color: #F0EDE6;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 2.5rem;
      opacity: 0.92;
    }

    .state-icon {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
      line-height: 1;
    }

    .headline {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #C8B97A;
      margin-bottom: 0.6rem;
    }

    .card-id {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: #8899B8;
      margin-bottom: 2rem;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #C8C0B0;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 2.5rem;
    }

    .countdown-wrap {
      margin-bottom: 1.5rem;
    }

    .countdown-label {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6A7A99;
      margin-bottom: 0.5rem;
    }

    .countdown-bar-track {
      width: 200px;
      height: 3px;
      background: #2E3D5A;
      border-radius: 2px;
      margin: 0 auto;
      overflow: hidden;
    }

    .countdown-bar-fill {
      height: 100%;
      background: #C8B97A;
      border-radius: 2px;
      width: 100%;
      transform-origin: left;
      transition: none;
    }

    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #25D366;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85rem 1.75rem;
      border-radius: 50px;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .wa-btn:active { opacity: 0.8; }

    .wa-icon {
      width: 20px;
      height: 20px;
      fill: #fff;
      flex-shrink: 0;
    }

    .claim-card-img {
      width: min(60vw, 180px);
      aspect-ratio: 2 / 3;
      border-radius: 10px;
      display: block;
      margin: 0 auto 1.75rem;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.5),
        0 0 36px 8px rgba(200, 150, 30, 0.28);
    }

    .claim-card-img.muted {
      filter: grayscale(30%) brightness(0.75);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .error-msg {
      font-size: 1rem;
      color: #8899B8;
      max-width: 280px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .maro-line {
      font-style: italic;
      font-size: 1.05rem;
      color: #C8B97A;
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto 2rem;
    }

    .passport-btn {
      display: block;
      width: 100%;
      max-width: 300px;
      background: #C8961E;
      color: #0D1525;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 50px;
      padding: 1rem 2rem;
      margin: 0 auto 0.85rem;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }

    .tell-maro-btn {
      display: block;
      width: 100%;
      max-width: 300px;
      color: #6A7A99;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 50px;
      border: 1px solid #2E3D5A;
      padding: 0.85rem 2rem;
      margin: 0 auto;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }

    .start-link {
      display: inline-block;
      color: #6A7A99;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px solid #2E3D5A;
      padding-bottom: 2px;
      margin-top: 1.5rem;
    }

    .claimed-headline { color: #6A7A99; }

    /* subtle shimmer on logo */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 0.92; transform: none; } }
    .logo { animation: fadeIn 0.6s ease both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
    .card-content { animation: slideUp 0.5s 0.15s ease both; }
  </style>
</head>
<body>

  <img class="logo" src="assets/logo.png" alt="Hidden Worlds" />

  <div class="card-content" id="card-content">
    <!-- filled by JS -->
  </div>

  <!-- Firebase SDK (v10 modular, ESM via CDN) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    // ── CONFIG ── paste your Firebase project values here ──────────────────────
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyBAO_WUszjtZWjmJP-M8wIv6K50Y8pbOZs",
      authDomain:        "hidden-worlds-b773d.firebaseapp.com",
      projectId:         "hidden-worlds-b773d",
    };
    // ── WHATSAPP ───────────────────────────────────────────────────────────────
    const WA_NUMBER = "385998427803";
    // ── REDIRECT DELAY (ms) ────────────────────────────────────────────────────
    const REDIRECT_DELAY = 2500;
    // ──────────────────────────────────────────────────────────────────────────

    const container = document.getElementById('card-content');

    const CARD_FOLDERS = {
      'LDN-2601': 'seven-noses',
      'LDN-2602': 'notting-hill-carnival',
      'LDN-2603': 'underground-republics',
      'MLT-2601': 'malta-oracle-chamber',
      'FRA-2601': 'frankfurt-wahlkapelle',
      'DBV-2601': 'dubrovnik-rudjer-boskovic',
    };

    // WhatsApp SVG icon
    const WA_SVG = `<svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.561 4.14 1.535 5.873L.057 23.98l6.262-1.643A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.812 9.812 0 01-5.007-1.37l-.36-.213-3.716.975.992-3.625-.234-.373A9.79 9.79 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/>
    </svg>`;

    // Strip run suffix (-R1, -R2, etc.) from card ID
    function stripRunSuffix(id) {
      return id.replace(/-R\d+$/i, '');
    }

    function waURL(cardId, message) {
      return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`;
    }

    function startCountdown(url) {
      const bar = document.getElementById('countdown-bar');
      if (!bar) return;
      const start = performance.now();
      function tick(now) {
        const elapsed = now - start;
        const pct = Math.max(0, 1 - elapsed / REDIRECT_DELAY);
        bar.style.width = `${pct * 100}%`;
        if (elapsed < REDIRECT_DELAY) {
          requestAnimationFrame(tick);
        } else {
          window.location.href = url;
        }
      }
      requestAnimationFrame(tick);
    }

    function cardImgHtml(cardId, muted) {
      const folder = CARD_FOLDERS[cardId];
      if (!folder) return '';
      return `<img class="claim-card-img${muted ? ' muted' : ''}" src="cards/${folder}/front.png" alt="Hidden Worlds card" />`;
    }

    function renderUnclaimed(cardId, waLink) {
      container.innerHTML = `
        ${cardImgHtml(cardId, false)}
        <div class="headline">This card is now yours.</div>
        <div class="card-id">${cardId} · Season I · 2026</div>
        <p class="maro-line">The Republic is done. The stories aren't.</p>
        <a class="passport-btn" href="index.html">Open your passport</a>
        <a class="tell-maro-btn" href="${waLink}">Tell Maro</a>
      `;
    }

    function renderClaimed(cardId, waLink) {
      container.innerHTML = `
        ${cardImgHtml(cardId, true)}
        <div class="headline claimed-headline">This card already has an owner.</div>
        <div class="card-id">${cardId}</div>
        <p class="subtitle">Every card has one.<br>This one isn't yours.</p>
        <a class="start-link" href="https://claim.hiddenworlds.travel">Start your own →</a>
      `;
    }

    function renderError(msg) {
      container.innerHTML = `
        <p class="error-msg">${msg}</p>
      `;
    }

    async function main() {
      const params = new URLSearchParams(window.location.search);
      const rawId  = params.get('unlock');
      const token  = (params.get('token') || '').toUpperCase();

      if (!rawId) {
        renderError('No card found. Scan the QR code on the back of your Hidden Worlds card.');
        return;
      }

      const cardId = stripRunSuffix(rawId.trim().toUpperCase());
      const tokenSuffix = token ? ` · ${token}` : '';

      // Check if Firebase config is still placeholder
      if (FIREBASE_CONFIG.apiKey === 'PASTE_HERE') {
        // Dev fallback: skip Firestore, go straight to unclaimed flow
        const link = waURL(cardId, `I have it. ${cardId}`);
        renderUnclaimed(cardId, link);
        return;
      }

      let db;
      try {
        const app = initializeApp(FIREBASE_CONFIG);
        db = getFirestore(app);
      } catch (e) {
        // Firebase init failed — degrade gracefully
        const link = waURL(cardId, `I have it. ${cardId}`);
        renderUnclaimed(cardId, link);
        return;
      }

      const cardRef = doc(db, 'cards', cardId);

      try {
        const snap = await getDoc(cardRef);

        if (snap.exists() && snap.data().claimed) {
          // Already claimed
          const link = waURL(cardId, `Show owner of ${cardId}${tokenSuffix}`);
          renderClaimed(cardId, link);
        } else {
          // Unclaimed — mark it and show claiming moment
          await setDoc(cardRef, { claimed: true, claimedAt: serverTimestamp() }, { merge: true });
          const link = waURL(cardId, `I have it. ${cardId}`);
          renderUnclaimed(cardId, link);
        }
      } catch (e) {
        // Firestore read/write failed — degrade to unclaimed
        const link = waURL(cardId, `Claim ${cardId}${tokenSuffix}`);
        renderUnclaimed(cardId, link);
      }
    }

    main();
  </script>
</body>
</html>
